<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <img id="img" src="10-1.thumb128.png"  ondblclick="src='11-1.thumb128.png'" >
    </center>
    <script>
        let img = document.getElementById("img");
        img.ondblclick = function() {
            if (img.src.includes("10-1.thumb128.png")){
            img.src="11-1.thumb128.png";
            } else {
                img.src="10-1.thumb128.png";
            }
        };
    </script>
</body>
</html>
